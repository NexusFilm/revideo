<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Signing you in...</title>
  <style>
    body { background: #111; color: #fff; font-family: system-ui, sans-serif;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; }
    .msg { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333;
               border-top-color: #6ee7b7; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>Signing you in...</p>
  </div>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = import.meta.env?.VITE_SUPABASE_URL
      || "https://ozzjcuamqslxjcfgtfhj.supabase.co";
    const SUPABASE_ANON_KEY = import.meta.env?.VITE_SUPABASE_ANON_KEY
      || "";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Handle the OAuth callback — exchanges the code for a session
    const { data, error } = await supabase.auth.exchangeCodeForSession(
      window.location.search
    );

    if (error) {
      document.querySelector("p").textContent = "Sign-in failed: " + error.message;
    } else {
      // Redirect back to the app
      window.location.replace("/");
    }
  </script>
</body>
</html>
